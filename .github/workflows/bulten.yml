name: Borsa Bülteni

on:
  schedule:
    # Saatler UTC'dir (TSİ = UTC + 3). Hepsi hafta içi (Pzt-Cum).
    - cron: "45 5 * * 1-5"        # 08:45 TSİ — Sabah: feed sıfırlanır, gece ABD haberleri toplanır
    - cron: "0,30 6-15 * * 1-5"   # 09:00–18:30 TSİ — BIST saatleri, her yarım saatte bir
    - cron: "30 16-20 * * 1-5"    # 19:30–23:30 TSİ — ABD basın/piyasa saatleri (yabancı basın + altın)
  workflow_dispatch:              # elle tetikleme (Actions sekmesinden)

permissions:
  contents: write

# Aynı anda tek çalıştırma: sık tetikleme nedeniyle turların üst üste binmesini önler
concurrency:
  group: bulten
  cancel-in-progress: false

jobs:
  bulten:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu al
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıkları yükle
        run: pip install -r requirements.txt

      - name: Bülteni derle
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scraper.py

      - name: Yayınla
        run: |
          git config user.name "borsa-gunlugu-bot"
          git config user.email "actions@github.com"

          for i in 1 2 3; do
            # Çıktılar her turda sıfırdan üretiliyor; birleştirme anlamsız,
            # en son üretilen kazanmalı. Bu yüzden: uzaktakini al, üstüne kendi
            # çıktımızı yaz, öyle commit'le.
            git fetch origin main
            git reset --soft origin/main   # geçmişi hizala, çalışma dizinindeki dosyalar korunur

            git add -A docs/ data/
            if git diff --cached --quiet; then
              echo "Değişiklik yok, yayın gerekmiyor"
              exit 0
            fi

            git commit -m "Bülten: $(date -u +'%Y-%m-%d %H:%M') UTC"
            if git push origin HEAD:main; then
              echo "Yayınlandı"
              exit 0
            fi

            echo "Push çakıştı (başka bir tur araya girdi), yeniden deneniyor ($i/3)…"
            sleep 5
          done
          echo "Push 3 denemede başarısız" && exit 1
